<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="application-name" content="情侣机">
    <title>情侣机</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fcebf3">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/system-ui.css">    
    <link rel="stylesheet" href="css/desktop.css">

    <!-- 图标库 -->
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">

</head>
<body>
    <!-- 手机外壳容器 -->
    <div id="phone-container">
        <!-- 桌面主屏幕 -->
        <div id="desktop">
            
            <!-- 顶部：个人信息区 -->
            <div class="profile-section">
                <div class="avatar"></div>
                <h1 class="username">OvO</h1>
                <p class="motto">我想要暖暖的幸福</p>
            </div>

            <!-- 小组件：时间和问候 -->
            <div class="widget time-widget">
                <p class="quote">☆*爱 是唯一通向你的次元的钥匙*☆</p>
                <div class="datetime">
                    <span class="date">01/01 星期一</span>
                    <span class="time">00:00:00</span>
                </div>
            </div>

            <!-- 中间部分：左侧小组件 + 右侧APP -->
            <div class="middle-section">
                <!-- 左侧：Kitten 小组件 -->
                <div class="widget kitten-widget">
                    <h2 class="kitten-title">♰.𝐾𝑖𝑡𝑡𝑒𝑛.♰</h2>
                    <div class="kitten-item">
                        <span class="dot"></span>
                        <span class="text">愿你被世界所爱</span>
                    </div>
                    <div class="kitten-item">
                        <span class="text">你就是我的全世界</span>
                        <span class="dot"></span>
                    </div>
                </div>

                <!-- 右侧：侧边APP -->
                <div class="side-apps">
                    <div class="app-icon" data-app="app1">
                        <div class="icon-box"></div>
                        <span class="app-name">APP1</span>
                    </div>
                    <div class="app-icon" data-app="app2">
                        <div class="icon-box"></div>
                        <span class="app-name">APP2</span>
                    </div>
                </div>
            </div>

            <!-- 底部：固定停靠栏 (Dock) -->
            <div class="dock">
                <div class="app-icon" data-app="app3">
                    <div class="icon-box"></div>
                    <span class="app-name">APP3</span>
                </div>
                <div class="app-icon" data-app="app4">
                    <div class="icon-box"></div>
                    <span class="app-name">APP4</span>
                </div>
                <div class="app-icon" data-app="app5">
                    <div class="icon-box"></div>
                    <span class="app-name">APP5</span>
                </div>
                <div class="app-icon" data-app="app6">
                    <div class="icon-box"></div>
                    <span class="app-name">APP6</span>
                </div>
            </div>

        </div>

                <!-- APP 容器（默认隐藏） -->
        <div id="app-container" class="hidden"></div>
    </div>
<script type="module" src="./js/main.js"></script>
</body>
</html>
